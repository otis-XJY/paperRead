name: Zotero AI Daily Papers

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-auto-paper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Build Zotero Knowledge Base
        env:
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
        run: python zotero_indexer.py

      - name: Run AI Analysis & Push
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
        run: python main.py

      - name: Commit State Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch history.json knowledge_base.json state.json
          git add history.json knowledge_base.json state.json
          git commit -m "chore: update history, knowledge base and state" || echo "No changes to commit"
          git push || echo "No changes to push"